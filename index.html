<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conveyance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Public Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .blue-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .fab { position: fixed; bottom: 24px; right: 24px; z-index: 50; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .loader { border-top-color: #ffffff; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900 min-h-screen pb-24">

    <!-- Header Section -->
    <div class="bg-white border-b border-slate-200 px-4 py-4 mb-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Conveyance App</h1>
                <p id="headerMonth" class="text-[10px] text-blue-600 font-bold uppercase tracking-[0.2em]">Loading...</p>
            </div>
            <button onclick="generatePDF()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition-all">
                <i class="fas fa-file-pdf mr-2"></i> EXPORT PDF
            </button>
        </div>
    </div>

    <main class="p-4 max-w-md mx-auto">
        <!-- Month Filter -->
        <div class="mb-4">
            <input type="month" id="monthFilter" onchange="renderList()" class="w-full p-4 rounded-2xl bg-white border border-slate-200 shadow-sm font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Total Bill Blue Card -->
        <div class="blue-gradient rounded-[2rem] p-7 shadow-xl mb-8 text-white relative overflow-hidden group">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <p class="text-blue-100 text-[11px] font-bold uppercase tracking-widest mb-1 opacity-80">Total Bill Summary</p>
                    <h2 id="monthTotal" class="text-4xl font-black tracking-tight">৳ 0</h2>
                </div>
                <button onclick="loadData()" class="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <i class="fas fa-wallet absolute -bottom-6 -right-6 text-9xl text-white opacity-5 group-hover:scale-110 transition-transform"></i>
        </div>

        <!-- Monthly Expenses List -->
        <div class="flex justify-between items-end mb-4 px-1">
            <h3 id="listHeading" class="font-black text-slate-800 text-lg uppercase tracking-tight">Expenses</h3>
        </div>
        
        <div id="expenseList" class="space-y-4"></div>
    </main>

    <!-- FAB -->
    <button onclick="openModal()" class="fab bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-2xl active:scale-90 transition-all">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal Logic remains same for Add Entry -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl w-full max-w-sm p-7 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800">New Entry</h2>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="expenseForm" class="space-y-5">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Select Date</label>
                    <input type="date" id="date" required class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all">
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Type</label>
                    <select id="type" onchange="handleTypeChange()" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold text-slate-700">
                        <option value="Bike">Bike</option>
                        <option value="Rickshaw">Rickshaw</option>
                        <option value="Meal">Meal</option>
                    </select>
                </div>

                <div id="transportFields" class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">From</label>
                        <input type="text" id="from" placeholder="Office" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">To</label>
                        <input type="text" id="to" placeholder="Site" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    </div>
                </div>

                <div id="mealField" class="hidden">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Meal Category</label>
                    <select id="mealDesc" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                    </select>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Cost (৳)</label>
                    <input type="number" id="cost" required placeholder="0.00" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-black text-blue-600 text-xl">
                </div>

                <div id="roundTripField">
                    <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl cursor-pointer border border-slate-100">
                        <input type="checkbox" id="isRoundTrip" class="w-6 h-6 rounded-lg text-blue-600 border-slate-300">
                        <span class="text-slate-600 font-bold text-sm">Round Trip (Auto-Return)</span>
                    </label>
                </div>

                <button type="submit" id="saveBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-blue-200 mt-2 active:scale-95 transition-all uppercase tracking-widest">Save Expense</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbySHmNzBC5qppUXJH-ByszRg8NhHu7jFdxQZb7F0UZeimCiabPWVy6vgdshrRIF6sz3Jw/exec';
        let expenses = [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('monthFilter').value = now.toISOString().substring(0, 7);
            document.getElementById('date').valueAsDate = now;
            loadData();
        };

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            const trans = document.getElementById('transportFields');
            const meal = document.getElementById('mealField');
            const rt = document.getElementById('roundTripField');
            
            if (type === 'Meal') {
                trans.classList.add('hidden'); rt.classList.add('hidden'); meal.classList.remove('hidden');
                document.getElementById('from').required = false; document.getElementById('to').required = false;
            } else {
                trans.classList.remove('hidden'); rt.classList.remove('hidden'); meal.classList.add('hidden');
                document.getElementById('from').required = true; document.getElementById('to').required = true;
            }
        }

        async function loadData() {
            const list = document.getElementById('expenseList');
            list.innerHTML = `<div class="flex justify-center py-20"><div class="loader rounded-full border-4 border-slate-300 h-8 w-8"></div></div>`;
            try {
                const res = await fetch(API_URL);
                expenses = await res.json();
                renderList();
            } catch (e) { alert("Check Connection"); }
        }

        function formatFriendlyDate(dateStr) {
            if(!dateStr) return "N/A";
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function renderList() {
            const selMonth = document.getElementById('monthFilter').value;
            const list = document.getElementById('expenseList');
            const [y, m] = selMonth.split('-');
            const monthLabel = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
            
            document.getElementById('headerMonth').innerText = monthLabel;
            document.getElementById('listHeading').innerText = `${monthLabel} Transactions`;

            const filtered = expenses.filter(item => item.Date.startsWith(selMonth))
                             .sort((a, b) => new Date(b.Date) - new Date(a.Date));
            
            let total = 0;
            let html = "";
            let processedTripIds = new Set();

            filtered.forEach(item => {
                if (item.TripID && processedTripIds.has(item.TripID)) return;
                
                const costVal = parseFloat(item.Cost || 0);
                total += costVal;

                let cardContent = "";
                let isRT = item.isRoundTrip === "YES" && item.TripID;

                if (item.Type === "Meal") {
                    cardContent = `
                        <div class="w-12 h-12 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center text-xl"><i class="fas fa-utensils"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-0.5">${formatFriendlyDate(item.Date)}</p>
                            <p class="font-black text-slate-800 text-lg">${item.MealDesc || 'Meal'}</p>
                        </div>`;
                } else if (isRT) {
                    processedTripIds.add(item.TripID);
                    cardContent = `
                        <div class="w-12 h-12 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i class="fas fa-route"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-0.5">${formatFriendlyDate(item.Date)}</p>
                            <p class="font-bold text-slate-800 text-sm leading-snug">${item.From} → ${item.To} / ${item.To} → ${item.From}</p>
                            <p class="text-[9px] text-blue-600 font-black mt-1 uppercase tracking-widest">ROUND TRIP • ${item.Type}</p>
                        </div>`;
                } else {
                    cardContent = `
                        <div class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-500 flex items-center justify-center text-xl"><i class="fas fa-location-arrow"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-0.5">${formatFriendlyDate(item.Date)}</p>
                            <p class="font-black text-slate-800 text-lg">${item.From} → ${item.To}</p>
                            <p class="text-[9px] text-slate-500 font-bold mt-0.5 uppercase tracking-widest">${item.Type}</p>
                        </div>`;
                }

                html += `
                    <div class="bg-white p-5 rounded-[1.75rem] shadow-sm border border-slate-200 flex items-center">
                        ${cardContent}
                        <div class="text-right ml-2 flex items-center gap-5">
                            <span class="font-black text-slate-900 text-xl tracking-tighter">৳${costVal || '-'}</span>
                            <button onclick="deleteEntry('${item.RowID}', '${item.TripID || ''}')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-50 text-red-300 hover:text-red-500 active:scale-90 transition-all">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>`;
            });

            list.innerHTML = html || `<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">Empty Log</div>`;
            document.getElementById('monthTotal').innerText = `৳ ${total}`;
        }

        async function deleteEntry(rowId, tripId) {
            if(!confirm("Are you sure? This cannot be undone.")) return;
            
            // Show loading state on button
            event.currentTarget.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'DELETE', rowId: rowId, tripId: tripId }) 
                });
                loadData();
            } catch (e) {
                alert("Delete failed. Check internet.");
                loadData();
            }
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Saving...';
            btn.disabled = true;

            const data = {
                date: document.getElementById('date').value,
                from: document.getElementById('from').value,
                to: document.getElementById('to').value,
                type: document.getElementById('type').value,
                cost: document.getElementById('cost').value,
                mealDesc: document.getElementById('mealDesc').value,
                isRoundTrip: document.getElementById('isRoundTrip').checked ? "YES" : "NO"
            };

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            closeModal();
            btn.innerHTML = 'Save Expense';
            btn.disabled = false;
            document.getElementById('expenseForm').reset();
            loadData();
        };

        function openModal() { document.getElementById('modal').classList.remove('hidden'); handleTypeChange(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function generatePDF() {
    const selMonth = document.getElementById('monthFilter').value;
    // Sort ascending for the official report
    const filtered = expenses.filter(item => item.Date.startsWith(selMonth))
                     .sort((a, b) => new Date(a.Date) - new Date(b.Date));
    
    if (!filtered.length) return alert("No data to export");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const [y, m] = selMonth.split('-');
    const mName = new Date(y, m - 1).toLocaleString('default', { month: 'long', year: 'numeric' });

    // 1. Branding Header
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.setTextColor(0, 0, 0); 
    doc.text("Brothers Corporation Ltd.", 105, 18, { align: "center" });
    
    doc.setFillColor(235, 244, 255);
    doc.rect(15, 24, 180, 8, 'F');
    doc.setFontSize(14);
    doc.text("Conveyance Bill", 105, 30, { align: "center" });

    doc.setFontSize(11);
    doc.setFont("helvetica", "normal");
    doc.text(`Name : Khaled Jamil`, 15, 42);
    doc.setFont("helvetica", "bold");
    doc.text(`${mName}`, 195, 42, { align: "right" });

    // 2. Prepare Data Rows
    const tableData = filtered.map(item => ({
        date: formatD(item.Date),
        from: item.Type === 'Meal' ? item.MealDesc : item.From,
        to: item.Type === 'Meal' ? '' : item.To,
        type: item.Type,
        cost: item.Cost ? parseInt(item.Cost) : "",
        tripId: item.TripID,
        rawDate: item.Date
    }));

    let grandTotal = filtered.reduce((acc, curr) => acc + (parseFloat(curr.Cost) || 0), 0);

    // 3. Generate Table
    doc.autoTable({
        startY: 48,
        head: [['Date', 'From', 'To', 'Type', 'Cost']],
        body: tableData.map(r => [r.date, r.from, r.to, r.type, r.cost]),
        theme: 'grid',
        headStyles: { 
            fillColor: [255, 255, 255], 
            textColor: [0, 0, 0], 
            lineColor: [0, 0, 0], 
            lineWidth: 0.2, 
            fontStyle: 'bold' 
        },
        styles: { 
            fontSize: 10, 
            cellPadding: 3, 
            textColor: [0, 0, 0], 
            lineColor: [0, 0, 0], // SOLID BLACK BORDER
            lineWidth: 0.2 
        },
        columnStyles: { 
            0: { cellWidth: 35 },
            4: { halign: 'center', fontStyle: 'bold', cellWidth: 25 } 
        },
        didParseCell: function(data) {
            const rowIndex = data.row.index;
            const colIndex = data.column.index;
            const current = tableData[rowIndex];

            // --- DATE MERGING LOGIC ---
            if (colIndex === 0) {
                // If this isn't the first row and date is same as previous, hide it
                if (rowIndex > 0 && current.rawDate === tableData[rowIndex - 1].rawDate) {
                    data.cell.text = []; // Clear text
                } else {
                    // Calculate how many subsequent rows have the same date
                    let span = 1;
                    for (let i = rowIndex + 1; i < tableData.length; i++) {
                        if (tableData[i].rawDate === current.rawDate) span++;
                        else break;
                    }
                    if (span > 1) data.cell.rowSpan = span;
                }
            }

            // --- COST MERGING LOGIC (ROUND TRIP) ---
            if (colIndex === 4) {
                if (current.tripId) {
                    // Find if this is the first leg of a trip
                    const firstLegIndex = tableData.findIndex(r => r.tripId === current.tripId);
                    if (rowIndex === firstLegIndex) {
                        data.cell.rowSpan = 2; // Merge Cost across 2 rows
                    }
                }
            }
        },
        foot: [['', '', '', 'Total', grandTotal]],
        footStyles: { 
            fillColor: [240, 240, 240], 
            textColor: [0, 0, 0], 
            lineColor: [0, 0, 0], 
            lineWidth: 0.2, 
            fontStyle: 'bold', 
            halign: 'center' 
        }
    });

    doc.save(`Conveyance_Bill_${mName.replace(' ', '_')}.pdf`);
}
    </script>
</body>
</html>
