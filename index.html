<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conveyance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Public Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .fab { position: fixed; bottom: 24px; right: 24px; z-index: 50; }
        .loader { border-top-color: #2563eb; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        select, input { border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen pb-24">

    <!-- Header -->
    <header class="glass sticky top-0 border-b border-slate-200 px-4 py-3 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-slate-800">Conveyance App</h1>
                <p id="headerMonth" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">June 2026</p>
            </div>
            <button onclick="generatePDF()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-all">
                <i class="fas fa-file-pdf mr-1"></i> EXPORT PDF
            </button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- Month Filter -->
        <div class="mb-4">
            <input type="month" id="monthFilter" onchange="renderList()" class="w-full p-3 rounded-xl bg-white shadow-sm font-semibold text-slate-600">
        </div>

        <!-- Summary Card -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <div>
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Total Bill</p>
                <h2 id="monthTotal" class="text-3xl font-black text-slate-900">৳ 0</h2>
            </div>
            <div class="text-right">
                <button onclick="loadData()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 border border-slate-100"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>

        <!-- Monthly Expenses List -->
        <h3 id="listHeading" class="font-bold text-slate-700 mb-4 px-1">...</h3>
        <div id="expenseList" class="space-y-3"></div>
    </main>

    <!-- FAB -->
    <button onclick="openModal()" class="fab bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2rem] sm:rounded-[2rem] w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">New Entry</h2>
                <button onclick="closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="expenseForm" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Date</label>
                    <input type="date" id="date" required class="w-full p-4 rounded-xl bg-slate-50 outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Expense Type</label>
                    <select id="type" onchange="handleTypeChange()" class="w-full p-4 rounded-xl bg-slate-50 outline-none font-semibold">
                        <option value="Bike">Bike</option>
                        <option value="Rickshaw">Rickshaw</option>
                        <option value="Meal">Meal</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <!-- Transport Fields -->
                <div id="transportFields" class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">From</label>
                        <input type="text" id="from" placeholder="Office" class="w-full p-4 rounded-xl bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">To</label>
                        <input type="text" id="to" placeholder="Site" class="w-full p-4 rounded-xl bg-slate-50">
                    </div>
                </div>

                <!-- Meal Field -->
                <div id="mealField" class="hidden">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Meal Category</label>
                    <select id="mealDesc" class="w-full p-4 rounded-xl bg-slate-50 outline-none font-semibold">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Cost (৳)</label>
                    <input type="number" id="cost" required placeholder="0.00" class="w-full p-4 rounded-xl bg-slate-50 font-bold text-blue-600">
                </div>

                <div id="roundTripField">
                    <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl cursor-pointer">
                        <input type="checkbox" id="isRoundTrip" class="w-5 h-5 rounded text-blue-600">
                        <span class="text-slate-600 font-semibold text-sm">Round Trip (Auto-Return)</span>
                    </label>
                </div>

                <button type="submit" id="saveBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg mt-2 active:scale-95 transition-all">Save Expense</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbySHmNzBC5qppUXJH-ByszRg8NhHu7jFdxQZb7F0UZeimCiabPWVy6vgdshrRIF6sz3Jw/exec';
        let expenses = [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('monthFilter').value = now.toISOString().substring(0, 7);
            document.getElementById('date').valueAsDate = now;
            loadData();
        };

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            const trans = document.getElementById('transportFields');
            const meal = document.getElementById('mealField');
            const rt = document.getElementById('roundTripField');
            
            if (type === 'Meal') {
                trans.classList.add('hidden');
                rt.classList.add('hidden');
                meal.classList.remove('hidden');
                document.getElementById('from').required = false;
                document.getElementById('to').required = false;
            } else {
                trans.classList.remove('hidden');
                rt.classList.remove('hidden');
                meal.classList.add('hidden');
                document.getElementById('from').required = true;
                document.getElementById('to').required = true;
            }
        }

        async function loadData() {
            const list = document.getElementById('expenseList');
            list.innerHTML = `<div class="flex justify-center py-10 opacity-30"><div class="loader rounded-full border-4 border-slate-200 h-8 w-8"></div></div>`;
            try {
                const res = await fetch(API_URL);
                expenses = await res.json();
                renderList();
            } catch (e) { alert("Network Error"); }
        }

        function renderList() {
            const selMonth = document.getElementById('monthFilter').value;
            const list = document.getElementById('expenseList');
            const totalDisplay = document.getElementById('monthTotal');
            
            const [y, m] = selMonth.split('-');
            const monthLabel = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
            document.getElementById('headerMonth').innerText = monthLabel;
            document.getElementById('listHeading').innerText = `${monthLabel} Expenses`;

            const filtered = expenses.filter(item => item.Date.startsWith(selMonth))
                             .sort((a, b) => new Date(b.Date) - new Date(a.Date));
            
            let total = 0;
            let html = "";
            let processedIds = new Set();

            filtered.forEach(item => {
                if (processedIds.has(item.RowID)) return;
                
                const costVal = parseFloat(item.Cost || 0);
                total += costVal;

                let cardContent = "";
                let isRT = item.isRoundTrip === "YES" && item.TripID;

                if (item.Type === "Meal") {
                    cardContent = `
                        <div class="w-10 h-10 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center text-lg"><i class="fas fa-utensils"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${item.Date}</p>
                            <p class="font-bold text-slate-800">${item.MealDesc || 'Meal'}</p>
                        </div>`;
                } else if (isRT) {
                    // Find pair
                    const pair = filtered.find(p => p.TripID === item.TripID && p.RowID !== item.RowID);
                    if (pair) processedIds.add(pair.RowID);
                    cardContent = `
                        <div class="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center text-lg"><i class="fas fa-motorcycle"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${item.Date}</p>
                            <p class="font-bold text-slate-800 leading-tight">${item.From} <span class="text-blue-500">↔</span> ${item.To}</p>
                            <p class="text-[9px] text-slate-400 font-bold mt-0.5">ROUND TRIP • ${item.Type}</p>
                        </div>`;
                } else {
                    cardContent = `
                        <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center text-lg"><i class="fas fa-arrow-right"></i></div>
                        <div class="flex-1 ml-4">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${item.Date}</p>
                            <p class="font-bold text-slate-800 leading-tight">${item.From} → ${item.To}</p>
                            <p class="text-[9px] text-slate-400 font-bold mt-0.5">${item.Type}</p>
                        </div>`;
                }

                html += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                        ${cardContent}
                        <div class="text-right ml-2 flex items-center gap-4">
                            <span class="font-black text-slate-900 text-lg">৳${costVal || '-'}</span>
                            <button onclick="deleteEntry('${item.RowID}')" class="text-red-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });

            list.innerHTML = html || `<div class="text-center py-10 text-slate-300 font-bold">No Records</div>`;
            totalDisplay.innerText = `৳ ${total}`;
        }

        async function deleteEntry(rowId) {
            if(!confirm("Delete record?")) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'DELETE', rowId: rowId }) });
            loadData();
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            const data = {
                date: document.getElementById('date').value,
                from: document.getElementById('from').value,
                to: document.getElementById('to').value,
                type: document.getElementById('type').value,
                cost: document.getElementById('cost').value,
                mealDesc: document.getElementById('mealDesc').value,
                isRoundTrip: document.getElementById('isRoundTrip').checked ? "YES" : "NO"
            };

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            closeModal();
            btn.innerText = "Save Expense";
            btn.disabled = false;
            document.getElementById('expenseForm').reset();
            loadData();
        };

        function openModal() { document.getElementById('modal').classList.remove('hidden'); handleTypeChange(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // PDF Generation with MERGING logic
        function generatePDF() {
            const selMonth = document.getElementById('monthFilter').value;
            const filtered = expenses.filter(item => item.Date.startsWith(selMonth))
                             .sort((a, b) => new Date(a.Date) - new Date(b.Date));
            
            if(!filtered.length) return alert("No data");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const [y, m] = selMonth.split('-');
            const monthName = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });

            // Branding
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("Brothers Corporation Ltd.", 105, 18, { align: "center" });
            
            doc.setFillColor(235, 244, 255);
            doc.rect(15, 24, 180, 8, 'F');
            doc.setFontSize(14);
            doc.text("Conveyance Bill", 105, 30, { align: "center" });

            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(`Name : Khaled Jamil`, 15, 42);
            doc.setFont("helvetica", "bold");
            doc.text(`${monthName}`, 195, 42, { align: "right" });

            const rows = [];
            let grandTotal = 0;

            filtered.forEach(item => {
                const dateFmt = new Date(item.Date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                rows.push({
                    date: dateFmt,
                    from: item.Type === 'Meal' ? item.MealDesc : item.From,
                    to: item.Type === 'Meal' ? '' : item.To,
                    type: item.Type,
                    cost: item.Cost ? parseInt(item.Cost) : "",
                    tripId: item.TripID,
                    rawDate: item.Date
                });
                if(item.Cost) grandTotal += parseFloat(item.Cost);
            });

            doc.autoTable({
                startY: 48,
                head: [['Date', 'From', 'To', 'Type', 'Cost']],
                body: rows.map(r => [r.date, r.from, r.to, r.type, r.cost]),
                theme: 'grid',
                headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], lineWidth: 0.1, fontStyle: 'bold' },
                styles: { fontSize: 9, cellPadding: 3, textColor: [0, 0, 0] }, // SOLID BLACK TEXT
                columnStyles: { 4: { halign: 'center', fontStyle: 'bold' } },
                didParseCell: function(data) {
                    const rowIndex = data.row.index;
                    const colIndex = data.column.index;
                    const current = rows[rowIndex];

                    // Date Merging
                    if (colIndex === 0) {
                        if (rowIndex > 0 && current.rawDate === rows[rowIndex-1].rawDate) {
                            data.cell.styles.fontSize = 0.1; // Hide text
                            data.cell.styles.textColor = [255,255,255];
                        }
                    }

                    // Cost Merging for Round Trips
                    if (colIndex === 4 && current.tripId) {
                        const pairIndex = rows.findIndex((r, idx) => r.tripId === current.tripId && idx !== rowIndex);
                        if (pairIndex > rowIndex) {
                            data.cell.rowSpan = 2;
                        }
                    }
                },
                foot: [['', '', 'Total', '', grandTotal]],
                footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold', halign: 'center' }
            });

            doc.save(`Conveyance_${selMonth}.pdf`);
        }
    </script>
</body>
</html>
