<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conveyance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Public Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .blue-card { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white border-b border-slate-200 px-5 py-4 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-slate-800">Conveyance App</h1>
            <p id="headerMonth" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest"></p>
        </div>
        <button onclick="generatePDF()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg">EXPORT PDF</button>
    </header>

    <main class="max-w-md mx-auto p-5">
        <input type="month" id="monthFilter" onchange="renderList()" class="w-full p-4 rounded-2xl bg-white border border-slate-200 shadow-sm font-bold text-slate-700 mb-6 outline-none">

        <div class="blue-card rounded-[2.5rem] p-8 shadow-2xl text-white relative overflow-hidden mb-8">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <p class="text-blue-100 text-[11px] font-bold uppercase tracking-widest mb-1 opacity-80">Total Expense</p>
                    <h2 id="monthTotal" class="text-5xl font-black tracking-tighter italic">৳ 0</h2>
                </div>
                <button onclick="loadData()" class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center active:rotate-180 transition-all duration-500">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <h3 id="listHeading" class="font-black text-slate-800 text-lg uppercase mb-4">LOG</h3>
        <div id="expenseList" class="space-y-4"></div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-16 h-16 rounded-[1.5rem] shadow-2xl flex items-center justify-center text-2xl z-40"><i class="fas fa-plus"></i></button>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-end sm:items-center justify-center z-[60] p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-t-[3rem] sm:rounded-3xl w-full max-w-sm p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-slate-800">New Entry</h2>
                <button onclick="closeModal()" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <form id="expenseForm" class="space-y-5">
                <input type="date" id="date" required class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none">
                <select id="type" onchange="handleTypeChange()" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold outline-none">
                    <option value="Bike">Bike</option><option value="Rickshaw">Rickshaw</option><option value="Meal">Meal</option>
                </select>
                <div id="transportFields" class="grid grid-cols-2 gap-3">
                    <input type="text" id="from" placeholder="From" class="w-full p-4 rounded-2xl bg-slate-50">
                    <input type="text" id="to" placeholder="To" class="w-full p-4 rounded-2xl bg-slate-50">
                </div>
                <div id="mealField" class="hidden">
                    <select id="mealDesc" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold">
                        <option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option>
                    </select>
                </div>
                <input type="number" id="cost" required placeholder="Cost" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-black text-blue-600 text-2xl">
                <div id="roundTripField">
                    <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer border border-slate-100 font-bold">
                        <input type="checkbox" id="isRoundTrip" class="w-6 h-6 rounded-lg text-blue-600"> Round Trip
                    </label>
                </div>
                <button type="submit" id="saveBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Save Entry</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbySHmNzBC5qppUXJH-ByszRg8NhHu7jFdxQZb7F0UZeimCiabPWVy6vgdshrRIF6sz3Jw/exec';
        let expenses = [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('monthFilter').value = now.toISOString().substring(0, 7);
            document.getElementById('date').valueAsDate = now;
            loadData();
        };

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            document.getElementById('transportFields').classList.toggle('hidden', type === 'Meal');
            document.getElementById('roundTripField').classList.toggle('hidden', type === 'Meal');
            document.getElementById('mealField').classList.toggle('hidden', type !== 'Meal');
        }

        async function loadData() {
            const list = document.getElementById('expenseList');
            list.innerHTML = `<div class="text-center py-20 font-bold text-slate-400 italic">Syncing...</div>`;
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                expenses = await res.json();
                renderList();
            } catch (e) { alert("Error loading data"); }
        }

        function formatD(dateStr) {
            if(!dateStr) return "";
            const [y, m, d] = dateStr.split('-');
            return new Date(y, m-1, d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function renderList() {
            const selMonth = document.getElementById('monthFilter').value;
            const list = document.getElementById('expenseList');
            const [y, m] = selMonth.split('-');
            const mLabel = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
            document.getElementById('headerMonth').innerText = mLabel.toUpperCase();
            document.getElementById('listHeading').innerText = `${mLabel} Log`;

            const filtered = expenses.filter(item => item.Date.startsWith(selMonth)).sort((a,b) => new Date(b.Date) - new Date(a.Date));
            let total = 0;
            let html = "";
            let processedTripIds = new Set();

            filtered.forEach(item => {
                if (item.TripID && processedTripIds.has(item.TripID)) return;
                const cost = parseFloat(item.Cost || 0);
                total += cost;

                let content = "";
                let delRow = item.RowID;
                let delTrip = "";

                if (item.Type === "Meal") {
                    content = `<p class="font-black text-slate-800 text-lg">${item.MealDesc || 'Meal'}</p>`;
                } else if (item.isRoundTrip === "YES" && item.TripID) {
                    processedTripIds.add(item.TripID);
                    content = `<p class="font-bold text-slate-800 text-sm">${item.From} ↔ ${item.To}</p><p class="text-[10px] text-blue-600 font-black uppercase">ROUND TRIP</p>`;
                    delTrip = item.TripID;
                } else {
                    content = `<p class="font-black text-slate-800 text-lg">${item.From} → ${item.To}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${item.Type}</p>`;
                }

                html += `<div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 flex items-center">
                    <div class="flex-1 ml-2 overflow-hidden">
                        <p class="text-[10px] text-slate-400 font-black uppercase mb-1">${formatD(item.Date)}</p>
                        ${content}
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <span class="font-black text-slate-900 text-xl tracking-tight">৳${cost}</span>
                        <button onclick="deleteEntry('${delRow}', '${delTrip}')" class="w-10 h-10 rounded-xl bg-red-50 text-red-200 hover:text-red-500 flex items-center justify-center"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            });
            list.innerHTML = html || `<p class="text-center py-20 text-slate-300 font-bold">Empty</p>`;
            document.getElementById('monthTotal').innerText = `৳ ${total}`;
        }

        async function deleteEntry(rowId, tripId) {
            if(!confirm("Delete?")) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'DELETE', rowId, tripId }) });
                if(await res.text() === "Deleted") loadData();
            } catch (e) { alert("Network error"); }
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.innerText = "Saving..."; btn.disabled = true;
            const data = { date: document.getElementById('date').value, from: document.getElementById('from').value, to: document.getElementById('to').value, type: document.getElementById('type').value, cost: document.getElementById('cost').value, mealDesc: document.getElementById('mealDesc').value, isRoundTrip: document.getElementById('isRoundTrip').checked ? "YES" : "NO" };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            closeModal(); btn.innerText = "Save Entry"; btn.disabled = false;
            document.getElementById('expenseForm').reset(); loadData();
        };

        function openModal() { document.getElementById('modal').classList.remove('hidden'); handleTypeChange(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function generatePDF() {
            const selMonth = document.getElementById('monthFilter').value;
            const filtered = expenses.filter(item => item.Date.startsWith(selMonth)).sort((a,b) => new Date(a.Date) - new Date(b.Date));
            if(!filtered.length) return alert("No data");

            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const [y, m] = selMonth.split('-'); const mName = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
            
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.text("Brothers Corporation Ltd.", 105, 18, { align: "center" });
            doc.setFillColor(235, 244, 255); doc.rect(15, 24, 180, 8, 'F');
            doc.setFontSize(14); doc.text("Conveyance Bill", 105, 30, { align: "center" });
            doc.setFontSize(11); doc.setFont("helvetica", "normal"); doc.text(`Name : Khaled Jamil`, 15, 42); doc.setFont("helvetica", "bold"); doc.text(`${mName}`, 195, 42, { align: "right" });

            const body = filtered.map(item => [formatD(item.Date), item.Type === 'Meal' ? item.MealDesc : item.From, item.Type === 'Meal' ? '' : item.To, item.Type, item.Cost ? parseInt(item.Cost) : ""]);
            let total = filtered.reduce((acc, curr) => acc + (parseFloat(curr.Cost) || 0), 0);

            doc.autoTable({
                startY: 48,
                head: [['Date', 'From', 'To', 'Type', 'Cost']],
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], lineColor: [0, 0, 0], lineWidth: 0.2 },
                styles: { fontSize: 10, textColor: [0, 0, 0], lineColor: [0, 0, 0], lineWidth: 0.2, valign: 'middle' },
                columnStyles: { 0: { cellWidth: 35 }, 4: { halign: 'center', fontStyle: 'bold' } },
                didParseCell: function(data) {
                    if (data.row.section !== 'body') return;
                    const rowIndex = data.row.index;
                    const colIndex = data.column.index;
                    const item = filtered[rowIndex];

                    // Date Merge Boundary Check
                    if (colIndex === 0) {
                        if (rowIndex > 0 && item.Date === filtered[rowIndex-1].Date) {
                            data.cell.text = ""; 
                        } else {
                            let span = 1;
                            for (let i = rowIndex + 1; i < filtered.length; i++) {
                                if (filtered[i].Date === item.Date) span++; else break;
                            }
                            if (span > 1) data.cell.rowSpan = span;
                        }
                    }

                    // Cost Merge
                    if (colIndex === 4 && item.TripID) {
                        const firstIdx = filtered.findIndex(r => r.TripID === item.TripID);
                        if (rowIndex === firstIdx) data.cell.rowSpan = 2; else data.cell.text = "";
                    }
                },
                foot: [['', '', '', 'Total', total]],
                footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], lineColor: [0, 0, 0], lineWidth: 0.2, fontStyle: 'bold', halign: 'center' }
            });
            doc.save(`Conveyance_${mName}.pdf`);
        }
    </script>
</body>
</html>
